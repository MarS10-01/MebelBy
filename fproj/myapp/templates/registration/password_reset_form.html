{% extends "base.html" %}
{% block content %}

<div class="login-container">
  <form action="" method="post" class="login-form">
    {% csrf_token %}
    {% if form.email.errors %}
    {{form.email.errors}}
    {%endif%}
    <label>Ваш e-mail</label><br>
    <p>{{form.email}}</p>
    <input type="submit" value="Сброс пароля" class="but">
</form>
</div>
{% endblock %}

{% block extra_css %}
<style>
  .login-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 70vh;
        padding: 20px;
    }
  .but{
    color: white;
    background-color:#d32a18;
    border:none;
    border-radius:4px;
    width:100%;
    cursor: pointer;
    font-size: 16px;
    margin-bottom:10px;
    padding: 12px
  }
  .text{
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 16px;
  }
  .login-form{
        background-color:white;
        box-shadow: 0 0 15px rgba(0,0,0,0.1);
        width:100%;
        max-width: 400px;
        margin: 20px auto;
        padding: 30px;
        border-radius: 8px;
    }
  #id_email{
     background-color:white;
     box-shadow: 0 0 15px rgba(0,0,0,0.1);
     width:100%;
     max-width: 400px;
     margin: 20px auto;
     padding: 30px;
     border-radius: 8px;
     font-size: 22px
  }
</style>
{% endblock %}
